spring.application.name=gratitude-journal

# H2 in-memory database — zero install needed
spring.datasource.url=jdbc:h2:file:./data/gratitudedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# H2 browser console (useful for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Allow Angular to call this API (CORS)
server.port=8080
